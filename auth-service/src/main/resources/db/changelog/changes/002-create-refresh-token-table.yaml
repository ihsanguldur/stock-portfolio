databaseChangeLog:
  - changeSet:
      id: 002-create-refresh-token-table
      author: serphenix
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_refresh_tokens_user
                    references: users(id)
              - column:
                  name: expiry_date
                  type: TIMESTAMP
              - column:
                  name: revoked
                  type: BOOLEAN
      rollback:
        - dropTable:
            tableName: refresh_tokens