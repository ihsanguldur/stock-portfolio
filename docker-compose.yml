services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7

  kafka:
    image: apache/kafka:latest
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:19092,CONTROLLER://kafka:19093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_service_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      WALLET_SERVICE_URL: http://wallet-service:8082/api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  wallet-service:
    build:
      context: .
      dockerfile: wallet-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/wallet_service_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  stock-service:
    build:
      context: .
      dockerfile: stock-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/stock_service_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      SPRING_DATA_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
      redis:
        condition: service_started

  portfolio-service:
    build:
      context: .
      dockerfile: portfolio-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolio_service_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      STOCK_SERVICE_URL: http://stock-service:8083/api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transaction_service_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      WALLET_SERVICE_URL: http://wallet-service:8082/api
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8084/api
      STOCK_SERVICE_URL: http://stock-service:8083/api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  audit-service:
    build:
      context: .
      dockerfile: audit-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/audit_service_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8081
      WALLET_SERVICE_URL: http://wallet-service:8082
      STOCK_SERVICE_URL: http://stock-service:8083
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8084
      TRANSACTION_SERVICE_URL: http://transaction-service:8085
      AUDIT_SERVICE_URL: http://audit-service:8086
    depends_on:
      - auth-service
      - wallet-service
      - stock-service
      - portfolio-service
      - transaction-service
      - audit-service

volumes:
  postgres-data:
