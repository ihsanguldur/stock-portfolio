
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: api-gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: WALLET_SERVICE_URL
              value: http://wallet-service:8082
            - name: STOCK_SERVICE_URL
              value: http://stock-service:8083
            - name: PORTFOLIO_SERVICE_URL
              value: http://portfolio-service:8084
            - name: TRANSACTION_SERVICE_URL
              value: http://transaction-service:8085
            - name: AUDIT_SERVICE_URL
              value: http://audit-service:8086
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: portfolio
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080