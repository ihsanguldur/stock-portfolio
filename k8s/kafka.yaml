apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:latest
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:19093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:19092
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:19093"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
          ports:
            - containerPort: 19092
            - containerPort: 19093
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: portfolio
spec:
  selector:
    app: kafka
  ports:
    - name: internal
      port: 19092
      targetPort: 19092
    - name: controller
      port: 19093
      targetPort: 19093