databaseChangeLog:
  - changeSet:
      id: 001-create-holding-table
      author: serphenix
      changes:
        - createTable:
            tableName: holdings
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: stock_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: avg_cost
                  type: DECIMAL(19, 4)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: holdings
            columnNames: user_id, stock_id
            constraintName: uq_holdings_user_stock
      rollback:
        - dropTable:
            tableName: holdings