databaseChangeLog:
  - changeSet:
      id: 001-create-stock-table
      author: serphenix
      changes:
        - createTable:
            tableName: stocks
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: symbol
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_price
                  type: DECIMAL(19, 4)
              - column:
                  name: last_update
                  type: TIMESTAMP
      rollback:
        - dropTable:
            tableName: stocks