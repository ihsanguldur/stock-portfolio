        - insert:
            tableName: stocks
            columns:
              - column:
                  name: symbol
                  value: GOOGL
              - column:
                  name: name
                  value: Alphabet Inc.
        - insert:
            tableName: stocks
            columns:
              - column:
                  name: symbol
                  value: AMZN
              - column:
                  name: name
                  value: Amazon.com Inc.
        - insert:
            tableName: stocks
            columns:
              - column:
                  name: symbol
                  value: TSLA
              - column:
                  name: name
                  value: Tesla Inc.
        - insert:
            tableName: stocks
            columns:
              - column:
                  name: symbol
                  value: NVDA
              - column:
                  name: name
                  value: NVIDIA Corporation
        - insert:
            tableName: stocks
            columns:
              - column:
                  name: symbol
                  value: META
              - column:
                  name: name
                  value: Meta Platforms Inc.
        - insert:
            tableName: stocks
            columns:
              - column:
                  name: symbol
                  value: NFLX
              - column:
                  name: name
                  value: Netflix Inc.
      rollback:
        - delete:
            tableName: stocks
            where: "symbol IN ('AAPL','MSFT','GOOGL','AMZN','TSLA','NVDA','META','NFLX')"
