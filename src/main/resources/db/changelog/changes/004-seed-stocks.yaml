databaseChangeLog:
  - changeSet:
      id: 004-seed-stocks
      author: serphenix
      changes:
        - insert:
            tableName: stocks
            columns:
              - column:
                  name: symbol
                  value: AAPL
              - column:
                  name: name
                  value: Apple Inc.
        - insert:
            tableName: stocks
            columns:
              - column:
                  name: symbol
                  value: MSFT
              - column:
                  name: name
